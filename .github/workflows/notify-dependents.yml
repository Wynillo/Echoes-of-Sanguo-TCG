on:
  push:
    tags: ['v*']

jobs:
  notify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [Echoes-of-Sanguo-ENGINE, Echoes-of-Sanguo-EDITOR, Echoes-of-Sanguo-MOD-base]
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DISPATCH_PAT }}
          repository: Wynillo/${{ matrix.repo }}
          event-type: tcg-format-updated
          client-payload: '{"version": "${{ github.ref_name }}"}'
