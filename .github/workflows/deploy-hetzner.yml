name: Deploy to Hetzner

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/sanguo"
          strip_components: 1
          rm: true

      - name: Notify
        run: echo "Deployed ${{ github.ref_name }} to nightbeak.dev"
