name: Deploy to Hetzner

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
jobs:
  deploy:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: deploy
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            mkdir -p /var/www/sanguo
            rm -rf /var/www/sanguo/*

      - name: Copy files
        run: |
          echo "${{ secrets.HETZNER_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no -r dist/* deploy@${{ secrets.HETZNER_HOST }}:/var/www/sanguo/
          rm /tmp/deploy_key
      - name: Notify
        run: echo "Deployed ${{ github.ref_name }} to nightbeak.dev"
