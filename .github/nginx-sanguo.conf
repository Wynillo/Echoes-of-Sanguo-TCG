server {
    listen 443 ssl http2;
    server_name nightbeak.dev www.nightbeak.dev;
    
    ssl_certificate /etc/letsencrypt/live/nightbeak.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nightbeak.dev/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    
    root /var/www/sanguo;
    index index.html;
    
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Cache static assets
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2|ttf|eot|mp3|tcg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
